<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threat Modeling Authorization in MCP</title>
<style>
/* ============ RESET & BASE ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ============ THEME VARIABLES ============ */
:root {
  --bg: #0a0a0f; --surface: #161b22; --border: #27272a; --text: #e4e4e7;
  --text-dim: #a1a1aa; --text-bright: #fff;
  --red: #f87171; --green: #4ade80; --blue: #60a5fa; --yellow: #facc15; --accent: #a78bfa;
  --red-bg: rgba(239,68,68,0.08); --red-border: rgba(239,68,68,0.3);
  --green-bg: rgba(34,197,94,0.08); --green-border: rgba(34,197,94,0.3);
  --blue-bg: rgba(59,130,246,0.08); --blue-border: rgba(59,130,246,0.3);
  --code-bg: rgba(255,255,255,0.06);
  --terminal-bg: #0c0c0c; --terminal-border: #27272a;
  --img-purple: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
  --glow-opacity: 0.15;
}
:root.light {
  --bg: #f8f8fa; --surface: #fff; --border: #d4d4d8; --text: #27272a;
  --text-dim: #71717a; --text-bright: #09090b;
  --red: #dc2626; --green: #16a34a; --blue: #2563eb; --yellow: #ca8a04; --accent: #7c3aed;
  --red-bg: rgba(239,68,68,0.08); --red-border: rgba(239,68,68,0.4);
  --green-bg: rgba(34,197,94,0.08); --green-border: rgba(34,197,94,0.4);
  --blue-bg: rgba(59,130,246,0.08); --blue-border: rgba(59,130,246,0.4);
  --code-bg: rgba(0,0,0,0.05);
  --terminal-bg: #1a1a2e; --terminal-border: #374151;
  --img-purple: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 50%, #ede9fe 100%);
  --glow-opacity: 0;
}

/* ============ SLIDE CONTAINER ============ */
.deck { width: 100vw; height: 100vh; position: relative; }
.slide { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5vh 6vw; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
.slide.active { opacity: 1; pointer-events: auto; }
.slide.exit-left { animation: exitLeft 0.5s ease forwards; }
.slide.enter-right { animation: enterRight 0.5s ease forwards; }

@keyframes exitLeft { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(-4vw); } }
@keyframes enterRight { from { opacity:0; transform:translateX(4vw); } to { opacity:1; transform:translateX(0); } }

/* ============ TYPOGRAPHY ============ */
h1 { font-size: clamp(2rem, 5vw, 4rem); font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; color: var(--text-bright); }
h2 { font-size: clamp(1.4rem, 3vw, 2.4rem); font-weight: 700; line-height: 1.2; color: var(--text-bright); }
h3 { font-size: clamp(1rem, 2vw, 1.6rem); font-weight: 600; color: var(--text-dim); }
p, li { font-size: clamp(0.9rem, 1.5vw, 1.3rem); line-height: 1.6; }
code { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace; background: var(--code-bg); padding: 2px 8px; border-radius: 4px; font-size: 0.9em; }
pre { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: clamp(0.7rem, 1.2vw, 1rem); line-height: 1.5; }
.accent { color: var(--accent); }
.red { color: var(--red); }
.green { color: var(--green); }
.blue { color: var(--blue); }
.yellow { color: var(--yellow); }
.dim { color: var(--text-dim); }
.big { font-size: clamp(3rem, 8vw, 7rem); font-weight: 900; line-height: 1; }
.medium { font-size: clamp(1.5rem, 3.5vw, 3rem); font-weight: 700; line-height: 1.2; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* ============ LAYOUT HELPERS ============ */
.full { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; }
.center { text-align: center; align-items: center; }
.left { text-align: left; align-items: flex-start; }
.split { display: grid; grid-template-columns: auto auto; gap: 4vw; align-items: start; }
.split-60-40 { display: grid; grid-template-columns: 3fr 2fr; gap: 4vw; width: 100%; align-items: center; }
.split-40-60 { display: grid; grid-template-columns: 2fr 3fr; gap: 4vw; width: 100%; align-items: center; }
.stack { display: flex; flex-direction: column; gap: 1.5vh; }
.gap-sm { gap: 1vh; }
.gap-lg { gap: 3vh; }
.gap-xl { gap: 5vh; }
.mt-1 { margin-top: 1vh; }
.mt-2 { margin-top: 2vh; }
.mt-3 { margin-top: 3vh; }
.mb-1 { margin-bottom: 1vh; }
.w-full { width: 100%; }

/* ============ IMAGE PLACEHOLDERS ============ */
.img-placeholder {
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
  display: flex; align-items: center; justify-content: center;
  color: #6366f1; font-size: 0.8rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  position: relative; overflow: hidden;
  min-height: 120px;
}
.img-placeholder::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(99,102,241,0.05) 10px, rgba(99,102,241,0.05) 20px);
}
.img-placeholder span { position: relative; z-index: 1; text-align: center; padding: 1rem; }

/* Shape variations */
.shape-circle { border-radius: 50%; width: clamp(200px, 25vw, 400px); height: clamp(200px, 25vw, 400px); }
.shape-blob1 { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
.shape-blob2 { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
.shape-blob3 { border-radius: 50% 50% 20% 80% / 25% 80% 20% 75%; }
.shape-diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
.shape-hex { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
.shape-arch { border-radius: 50% 50% 0 0; }
.shape-leaf { border-radius: 0 50% 0 50%; }
.shape-slash { clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%); }
.shape-wave-top { clip-path: polygon(0% 15%, 10% 0%, 30% 12%, 50% 0%, 70% 12%, 90% 0%, 100% 15%, 100% 100%, 0% 100%); }
.shape-notch-right { clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%); }
.shape-scallop { border-radius: 30% 70% 30% 70%; }
.shape-squircle { border-radius: 22%; }
.shape-pill { border-radius: 999px; min-height: 80px; }
.shape-trapezoid { clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%); }

/* Image gradients per theme */
.img-red { background: linear-gradient(135deg, #450a0a, #991b1b, #450a0a); color: #f87171; }
.img-green { background: linear-gradient(135deg, #052e16, #166534, #052e16); color: #4ade80; }
.img-blue { background: linear-gradient(135deg, #0c1e3a, #1e3a5f, #0c1e3a); color: #60a5fa; }
.img-purple { background: linear-gradient(135deg, #1e1b4b, #312e81, #1e1b4b); color: #a78bfa; }
.img-amber { background: linear-gradient(135deg, #451a03, #78350f, #451a03); color: #fbbf24; }
.img-dark { background: linear-gradient(135deg, #0a0a0a, #18181b, #0a0a0a); color: #52525b; }

/* ============ SPECIAL COMPONENTS ============ */
.terminal {
  background: var(--terminal-bg); border: 1px solid var(--terminal-border); border-radius: 12px;
  padding: 2rem; font-family: 'JetBrains Mono', monospace;
  width: 100%; max-width: 700px; position: relative;
}
.terminal::before {
  content: '● ● ●'; position: absolute; top: 12px; left: 16px;
  color: #3f3f46; font-size: 0.6rem; letter-spacing: 4px;
}
.terminal pre { color: var(--text-dim); margin-top: 1rem; white-space: pre-wrap; }
.terminal .hl-red { color: var(--red); font-weight: 700; }
.terminal .hl-green { color: var(--green); }

.quote-block {
  border-left: 4px solid var(--accent); padding: 2rem 3rem;
  font-size: clamp(1.3rem, 2.5vw, 2.2rem); font-style: italic;
  color: var(--text); line-height: 1.4; max-width: 800px;
}
.quote-attr { font-size: 0.9rem; color: var(--text-dim); font-style: normal; margin-top: 1rem; }

.callout-box {
  background: var(--red-bg); border: 1px solid var(--red-border);
  border-radius: 12px; padding: 1.5rem 2rem; max-width: 700px;
}
.callout-box.blue { background: var(--blue-bg); border-color: var(--blue-border); }
.callout-box.green { background: var(--green-bg); border-color: var(--green-border); }

.badge {
  display: inline-block; padding: 4px 14px; border-radius: 999px;
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
}
.badge-red { background: rgba(239,68,68,0.15); color: #f87171; }
.badge-green { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-purple { background: rgba(167,139,250,0.15); color: #a78bfa; }

.layer-bar {
  padding: 1.2rem 2rem; border-radius: 8px; width: 100%; max-width: 700px;
  font-weight: 600; font-size: clamp(0.85rem, 1.3vw, 1.1rem);
}
.layer-bar.filled { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
.layer-bar.outline { background: transparent; border: 1px dashed var(--border); color: var(--text-dim); }

.check-list { list-style: none; }
.check-list li { padding: 0.4rem 0; }
.check-list li::before { content: '✓ '; color: var(--accent); font-weight: 700; }

.x-list { list-style: none; }
.x-list li { padding: 0.4rem 0; }
.x-list li::before { content: '✗ '; color: #f87171; font-weight: 700; }

.arrow-chain {
  display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace; font-size: clamp(0.7rem, 1.1vw, 0.95rem);
}
.arrow-chain .step {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  padding: 0.5rem 1rem; border-radius: 8px; color: #f87171; white-space: nowrap;
}
.arrow-chain .arrow { color: #f87171; font-size: 1.2em; }

.progress-dots {
  display: flex; gap: 8px; margin-bottom: 2vh;
}
.progress-dots .dot {
  width: 10px; height: 10px; border-radius: 50%; background: #27272a;
}
.progress-dots .dot.active { background: #a78bfa; }
.progress-dots .dot.done { background: #4ade80; }

.cta-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.2rem 1.5rem;
}
.cta-card h4 { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
.cta-card p { color: var(--text); font-size: clamp(0.8rem, 1.2vw, 1rem); }

/* ============ SECTION HEADERS ============ */
.section-slide { position: relative; }
.section-slide .section-num {
  position: absolute; top: 8vh; left: 6vw;
  font-size: clamp(5rem, 15vw, 12rem); font-weight: 900; color: rgba(167,139,250,0.08);
  line-height: 1; pointer-events: none;
}
.section-slide .section-label {
  position: relative; z-index: 1;
}

/* ============ DECORATIVE ============ */
.glow-red { box-shadow: 0 0 60px rgba(239,68,68,0.15); }
.glow-green { box-shadow: 0 0 60px rgba(34,197,94,0.15); }
.glow-purple { box-shadow: 0 0 60px rgba(167,139,250,0.15); }
.glow-blue { box-shadow: 0 0 60px rgba(59,130,246,0.15); }

.float-decoration {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: var(--glow-opacity); pointer-events: none;
}

.grid-bg {
  background-image: radial-gradient(rgba(167,139,250,0.08) 1px, transparent 1px);
  background-size: 30px 30px;
}

/* ============ ANIMATIONS ============ */
/* Slide-in: new row enters from right */
.slide-in-right {
  opacity: 0; transform: translateX(60px);
  animation: slideFromRight 0.5s ease forwards;
}
@keyframes slideFromRight {
  to { opacity: 1; transform: translateX(0); }
}

/* Stagger: lighter version for lists/recs */
.stagger > * {
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.stagger.animate > * { opacity: 1; transform: translateY(0); }
.stagger > *:nth-child(1) { transition-delay: 0s; }
.stagger > *:nth-child(2) { transition-delay: 0.2s; }
.stagger > *:nth-child(3) { transition-delay: 0.4s; }
.stagger > *:nth-child(4) { transition-delay: 0.6s; }
.stagger > *:nth-child(5) { transition-delay: 0.8s; }
.stagger > *:nth-child(6) { transition-delay: 1.0s; }

/* Fade-in with delay (for punchlines) */
.fade-delayed {
  opacity: 0; transition: opacity 0.8s ease;
}
.fade-delayed.animate { opacity: 1; }

/* Badge pulse */
.badge-red { animation: badge-pulse 3s ease-in-out infinite; }
@keyframes badge-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  50% { box-shadow: 0 0 20px 4px rgba(239,68,68,0.2); }
}

/* Draw-in for SVG lines */
.draw-in {
  stroke-dasharray: 1000; stroke-dashoffset: 1000;
  transition: stroke-dashoffset 1.5s ease;
}
.draw-in.animate { stroke-dashoffset: 0; }

@keyframes ominous-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(239,68,68,0.1); }
  50% { box-shadow: 0 0 30px rgba(239,68,68,0.4), 0 0 60px rgba(239,68,68,0.15); }
}

/* ============ CONTROLS ============ */
.controls {
  position: fixed; bottom: 2vh; right: 3vw; z-index: 100;
  display: flex; gap: 0.5rem; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #52525b;
  opacity: 0.4; transition: opacity 0.3s;
}
.controls:hover { opacity: 1; }
.controls button {
  background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.75rem;
}
.controls button:hover { color: var(--text-bright); }

/* ============ SPEAKER NOTES ============ */
.notes-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 1.5rem 3rem; font-size: 0.85rem; color: var(--text-dim);
  transform: translateY(100%); transition: transform 0.3s ease;
  max-height: 30vh; overflow-y: auto; backdrop-filter: blur(10px);
}
.notes-panel.visible { transform: translateY(0); }
.notes-panel .notes-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }

/* ============ PROGRESS BAR ============ */
.progress-bar {
  position: fixed; top: 0; left: 0; height: 3px; background: var(--accent);
  z-index: 100; transition: width 0.3s ease;
}

/* Light mode image placeholder overrides */
:root.light .img-placeholder { background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 50%, #ede9fe 100%); color: #7c3aed; }
:root.light .img-red { background: linear-gradient(135deg, #fee2e2, #fecaca, #fee2e2); color: #dc2626; }
:root.light .img-green { background: linear-gradient(135deg, #dcfce7, #bbf7d0, #dcfce7); color: #16a34a; }
:root.light .img-blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe, #dbeafe); color: #2563eb; }
:root.light .img-amber { background: linear-gradient(135deg, #fef3c7, #fde68a, #fef3c7); color: #ca8a04; }
:root.light .img-dark { background: linear-gradient(135deg, #f4f4f5, #e4e4e7, #f4f4f5); color: #71717a; }
:root.light .img-purple { background: linear-gradient(135deg, #ede9fe, #ddd6fe, #ede9fe); color: #7c3aed; }
:root.light .grid-bg { background-image: radial-gradient(var(--border) 1px, transparent 1px); }
:root.light .glow-red, :root.light .glow-green, :root.light .glow-purple, :root.light .glow-blue { box-shadow: none; }
:root.light .section-slide .section-num { opacity: 0.08; }

/* Light mode inline color overrides for hardcoded styles */
:root.light .terminal { background: #1e1b4b; }
:root.light .terminal pre { color: #c4b5fd; }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>
<div class="deck" id="deck"></div>

<div class="controls">
  <button onclick="goTo(0)" title="First slide">⏮</button>
  <button onclick="prev()" title="Previous">←</button>
  <span id="slideCounter">1 / 50</span>
  <button onclick="next()" title="Next">→</button>
  <button onclick="goTo(slides.length-1)" title="Last slide">⏭</button>
  <button onclick="toggleNotes()" title="Toggle notes (N)">📝</button>
  <button onclick="toggleFullscreen()" title="Fullscreen (F)">⛶</button>
  <button onclick="toggleTheme()" title="Light/Dark mode (L)">☀️</button>
</div>

<div class="notes-panel" id="notesPanel">
  <div class="notes-label">Speaker Notes</div>
  <div id="notesContent"></div>
</div>

<script>
const slides = [

{

{
  notes: "'Recommendation three. And here's the good news. We already solved this. The identity community already built the tools for constraining what sub-agents can do. It's called Rich Authorization Requests - RFC 9396. The authorization_details claim in an OAuth token carries structured, fine-grained permissions. Not just flat scopes like jira:read - actual policies describing what actions on what resources. When The Cat spawns Little Cat A, it does a token exchange with the AS and gets a new token with narrower authorization_details. The Jira server checks the token - standard OAuth validation - and reads the authorization_details to see if this action is covered. No new token types. No new fields on tool calls. Just OAuth, used properly. The only thing MCP needs to do is make this a first-class concept: let servers declare authorizationDetailsRequired as a capability, so they can require these constrained tokens from sub-agents.'",

// ============ ENGINE ============
let current = Math.max(0, (parseInt(location.hash.replace('#',''),10) || 1) - 1);
let notesVisible = false;
const deck = document.getElementById('deck');

function render() {
  deck.innerHTML = '';
  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === current ? ' active' : '');
    div.innerHTML = s.html;
    deck.appendChild(div);
  });
  document.getElementById('slideCounter').textContent = `${current + 1} / ${slides.length}`;
  document.getElementById('progressBar').style.width = `${((current + 1) / slides.length) * 100}%`;
  document.getElementById('notesContent').textContent = slides[current].notes || '';
  history.replaceState(null, '', '#' + (current + 1));
  // Trigger animations on the active slide after a frame
  requestAnimationFrame(() => {
    const active = deck.querySelector('.slide.active');
    if (active) {
      active.querySelectorAll('.cascade, .stagger').forEach(el => el.classList.add('animate'));
      active.querySelectorAll('.fade-delayed').forEach(el => el.classList.add('animate'));
      active.querySelectorAll('.draw-in').forEach(el => el.classList.add('animate'));
    }
  });
}

function next() { if (current < slides.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function goTo(n) { current = Math.max(0, Math.min(n, slides.length - 1)); render(); }
function toggleNotes() {
  notesVisible = !notesVisible;
  document.getElementById('notesPanel').classList.toggle('visible', notesVisible);
}
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
function toggleTheme() {
  document.documentElement.classList.toggle('light');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
  if (e.key === 'Home') { e.preventDefault(); goTo(0); }
  if (e.key === 'End') { e.preventDefault(); goTo(slides.length - 1); }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'n' || e.key === 'N') toggleNotes();
  if (e.key === 'l' || e.key === 'L') toggleTheme();
  if (e.key === 'Escape' && notesVisible) toggleNotes();
});

// Touch/swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) { dx < 0 ? next() : prev(); }
});

window.addEventListener('hashchange', () => {
  const n = parseInt(location.hash.replace('#',''),10) - 1;
  if (!isNaN(n) && n !== current) { current = Math.max(0, Math.min(n, slides.length - 1)); render(); }
});
render();
</script>
