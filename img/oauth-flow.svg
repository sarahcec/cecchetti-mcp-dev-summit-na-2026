<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 170 930 180" style="background:#0a0a0f">
  <defs>
    <marker id="arr-right" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a1a1aa"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Human -->
  <rect x="60" y="210" width="180" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="150" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#e4e4e7">Human</text>

  <!-- Application -->
  <rect x="380" y="210" width="200" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="480" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#e4e4e7">Application</text>

  <!-- Protected Resource -->
  <rect x="720" y="210" width="200" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="#a1a1aa" stroke-width="1.5"/>
  <text x="820" y="250" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#e4e4e7">Protected</text>
  <text x="820" y="275" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#e4e4e7">Resource</text>

  <!-- Arrow: Application → Protected Resource (token) -->
  <line x1="590" y1="235" x2="710" y2="235" stroke="#a1a1aa" stroke-width="2" marker-end="url(#arr-right)"/>
  <text x="650" y="222" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#a1a1aa">token</text>

  <!-- Arrow: Protected Resource → Application (data) — drawn left-to-right with marker at start -->
  <line x1="590" y1="270" x2="710" y2="270" stroke="#60a5fa" stroke-width="2" marker-start="url(#arr-blue)"/>
  <text x="650" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#60a5fa">data</text>

  <!-- Arrow: Application → Human (data) — drawn left-to-right with marker at start -->
  <line x1="250" y1="260" x2="370" y2="260" stroke="#60a5fa" stroke-width="2" marker-start="url(#arr-blue)"/>
  <text x="310" y="288" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#60a5fa">data</text>
</svg>