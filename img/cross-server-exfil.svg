<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background:#0a0a0f">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Lanes -->
  <line x1="150" y1="80" x2="150" y2="420" stroke="#27272a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="80" x2="400" y2="420" stroke="#27272a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="650" y1="80" x2="650" y2="420" stroke="#27272a" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Server A (red) -->
  <rect x="90" y="20" width="120" height="50" rx="10" fill="rgba(239,68,68,0.12)" stroke="#f87171" stroke-width="1.5"/>
  <text x="150" y="50" text-anchor="middle" fill="#f87171" font-family="Inter,sans-serif" font-size="14" font-weight="600">Server A</text>
  <text x="150" y="90" text-anchor="middle" fill="#71717a" font-family="Inter,sans-serif" font-size="11">malicious</text>

  <!-- Host LLM (blue) -->
  <rect x="335" y="20" width="130" height="50" rx="10" fill="rgba(59,130,246,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="400" y="50" text-anchor="middle" fill="#60a5fa" font-family="Inter,sans-serif" font-size="14" font-weight="600">Host LLM</text>

  <!-- Server B (green) -->
  <rect x="590" y="20" width="120" height="50" rx="10" fill="rgba(34,197,94,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="650" y="50" text-anchor="middle" fill="#4ade80" font-family="Inter,sans-serif" font-size="14" font-weight="600">Server B</text>
  <text x="650" y="90" text-anchor="middle" fill="#71717a" font-family="Inter,sans-serif" font-size="11">has PII</text>

  <!-- Step 1: Server A → LLM (sampling/createMessage) -->
  <line x1="160" y1="140" x2="380" y2="140" stroke="#f87171" stroke-width="2"/>
  <polygon points="380,134 395,140 380,146" fill="#f87171"/>
  <text x="275" y="132" text-anchor="middle" fill="#f87171" font-family="JetBrains Mono,monospace" font-size="10">sampling/createMessage</text>
  <circle cx="135" cy="140" r="4" fill="#f87171"/>

  <!-- Step 2: LLM → Server B (tools/call) -->
  <line x1="412" y1="200" x2="630" y2="200" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="630,194 645,200 630,206" fill="#60a5fa"/>
  <text x="525" y="192" text-anchor="middle" fill="#60a5fa" font-family="JetBrains Mono,monospace" font-size="10">tools/call</text>
  <circle cx="405" cy="200" r="4" fill="#60a5fa"/>

  <!-- Step 3: Server B → LLM (PII data) -->
  <line x1="638" y1="260" x2="420" y2="260" stroke="#4ade80" stroke-width="2"/>
  <polygon points="420,254 405,260 420,266" fill="#4ade80"/>
  <text x="525" y="252" text-anchor="middle" fill="#4ade80" font-family="JetBrains Mono,monospace" font-size="10">PII data</text>
  <circle cx="645" cy="260" r="4" fill="#4ade80"/>

  <!-- Step 4: LLM → Server A (sampling response with PII) -->
  <line x1="388" y1="320" x2="170" y2="320" stroke="#f87171" stroke-width="2"/>
  <polygon points="170,314 155,320 170,326" fill="#f87171"/>
  <text x="275" y="312" text-anchor="middle" fill="#f87171" font-family="JetBrains Mono,monospace" font-size="10">sampling response + PII</text>
  <circle cx="395" cy="320" r="4" fill="#f87171"/>

  <!-- Step numbers -->
  <circle cx="115" cy="140" r="12" fill="#f87171" opacity="0.2"/><text x="115" y="144" text-anchor="middle" fill="#f87171" font-family="Inter,sans-serif" font-size="11" font-weight="700">1</text>
  <circle cx="390" cy="180" r="12" fill="#60a5fa" opacity="0.2"/><text x="390" y="184" text-anchor="middle" fill="#60a5fa" font-family="Inter,sans-serif" font-size="11" font-weight="700">2</text>
  <circle cx="660" cy="240" r="12" fill="#4ade80" opacity="0.2"/><text x="660" y="244" text-anchor="middle" fill="#4ade80" font-family="Inter,sans-serif" font-size="11" font-weight="700">3</text>
  <circle cx="390" cy="340" r="12" fill="#f87171" opacity="0.2"/><text x="390" y="344" text-anchor="middle" fill="#f87171" font-family="Inter,sans-serif" font-size="11" font-weight="700">4</text>

  <!-- Exfiltrated label -->
  <text x="150" y="380" text-anchor="middle" fill="#f87171" font-family="Inter,sans-serif" font-size="12" font-weight="600" opacity="0.7">⚠ data exfiltrated</text>
</svg>
